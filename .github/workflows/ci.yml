name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # If your application requires a test database (e.g., PostgreSQL),
      # you can configure it here as a service container.
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Match your local venv Python version

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirement.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt
          pip install pytest pytest-cov httpx # Ensure testing dependencies are installed

      - name: Run Linting (Optional but Recommended)
        run: |
          pip install ruff
          ruff check .

      - name: Run Test Suite with Coverage
        env:
          # Pass environment variables for your test database or configs here
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
        run: |
          pytest --cov=app tests/
